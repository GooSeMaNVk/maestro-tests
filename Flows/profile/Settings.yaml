appId: tj.komyob.betting
---
- scroll

- tapOn: |-
    Иконка настроек
    Настройки

# Проверка безлогинной зоны
- runFlow:
    commands:
      - tapOn: |-
          Иконка выбора темы
          Тема
          Системная
      - tapOn: Светлая
      - takeScreenshot: Theme_Light
      - assertScreenshot: Theme_Light.png
      - tapOn: Тёмная
      - takeScreenshot: Theme_Dark
      - assertScreenshot: Theme_Dark.png
      - tapOn: Системная
      - takeScreenshot: Theme_System
      - assertScreenshot: Theme_System.png
      - tapOn: Назад
# Проверка логинной зоны
- runFlow:
    when:
      visible: Сервис
    commands:
