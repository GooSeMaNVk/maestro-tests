        Умная сортировка
    - assertVisible: |-
        Иконка настроек пин-кода
        Настроить ПИН-код
    - assertVisible: |-
        Иконка смены пароля
        Сменить пароль
    - tapOn: |-
        Иконка уведомлений
        Уведомления
- tapOn: |-
